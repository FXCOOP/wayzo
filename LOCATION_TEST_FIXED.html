<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayzo Location Detection Test - FIXED</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; border: 1px solid #bee5eb; }
        input { padding: 10px; width: 300px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; }
        #log { background: #f8f9fa; padding: 15px; border-radius: 4px; margin: 20px 0; max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>

<h1>🗺️ Wayzo Location Detection Test - FIXED VERSION</h1>

<div class="info">
    <strong>✅ Updated with working location services</strong><br>
    Using ipinfo.io + multiple fallbacks instead of broken APIs
</div>

<div>
    <label for="from">From (should auto-detect):</label><br>
    <input type="text" id="from" placeholder="Click 'Detect Location' to test">
    <button onclick="testLocationDetection()">🔍 Detect Location</button>
    <button onclick="clearLog()">🗑️ Clear Log</button>
</div>

<div id="status"></div>
<div id="log"></div>

<script>
function log(message, type = 'info') {
    const logDiv = document.getElementById('log');
    const timestamp = new Date().toLocaleTimeString();
    const colorClass = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
    logDiv.innerHTML += `<div class="${colorClass}">[${timestamp}] ${message}</div>`;
    logDiv.scrollTop = logDiv.scrollHeight;
    console.log(`[${timestamp}] ${message}`);
}

function clearLog() {
    document.getElementById('log').innerHTML = '';
    document.getElementById('status').innerHTML = '';
}

function updateStatus(message, type = 'info') {
    const statusDiv = document.getElementById('status');
    const colorClass = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
    statusDiv.innerHTML = `<div class="status ${colorClass}">${message}</div>`;
}

// FIXED VERSION - EXACT SAME CODE AS UPDATED WAYZO FRONTEND
async function testLocationDetection() {
    const fromField = document.getElementById('from');
    if (!fromField) {
        log('❌ From field not found', 'error');
        return;
    }

    // Show detection in progress
    fromField.placeholder = 'Detecting your location...';
    updateStatus('🔍 Starting location detection...', 'info');
    log('🔍 Starting location detection with ipinfo.io...');

    try {
        log('📡 Fetching from ipinfo.io...');

        // Try ipinfo.io first (more reliable)
        let response = await fetch('https://ipinfo.io/json', {
            method: 'GET',
            headers: {
                'Accept': 'application/json'
            }
        });

        log(`📡 Response status: ${response.status} ${response.statusText}`);

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        let data = await response.json();
        log(`📊 Location data from ipinfo.io: ${JSON.stringify(data, null, 2)}`, 'success');

        // Check for valid response
        if (data.error) {
            throw new Error(data.error);
        }

        if (data.city && data.country) {
            const location = `${data.city}, ${data.country}`;
            fromField.value = location;
            fromField.placeholder = location;
            log(`✅ Location detected successfully: ${location}`, 'success');
            updateStatus(`✅ Location detected: ${location}`, 'success');
            return;
        } else if (data.country) {
            fromField.value = data.country;
            fromField.placeholder = data.country;
            log(`✅ Country detected: ${data.country}`, 'success');
            updateStatus(`✅ Country detected: ${data.country}`, 'success');
            return;
        }

        throw new Error('Incomplete location data');

    } catch (error) {
        log(`❌ First service failed: ${error.message}`, 'error');
        log('🔄 Trying backup location detection with ipapi.co...');

        // Fallback to ipapi.co (different endpoint)
        try {
            // Try ipapi.co with different approach
            const backupResponse = await fetch('https://ipapi.co/city/', {
                method: 'GET',
                headers: { 'Accept': 'text/plain' }
            });

            if (backupResponse.ok) {
                const city = await backupResponse.text();
                log(`📊 City from ipapi.co: ${city}`);

                const countryResponse = await fetch('https://ipapi.co/country_name/', {
                    method: 'GET',
                    headers: { 'Accept': 'text/plain' }
                });

                if (countryResponse.ok) {
                    const country = await countryResponse.text();
                    log(`📊 Country from ipapi.co: ${country}`);

                    if (city && country && city !== 'undefined' && country !== 'undefined') {
                        const location = `${city.trim()}, ${country.trim()}`;
                        fromField.value = location;
                        fromField.placeholder = location;
                        log(`✅ Backup location detected: ${location}`, 'success');
                        updateStatus(`✅ Backup location detected: ${location}`, 'success');
                        return;
                    }
                }
            }

            // Final fallback - get country only from ipinfo.io
            log('🔄 Trying final fallback...');
            const finalResponse = await fetch('https://ipinfo.io/country');
            if (finalResponse.ok) {
                const countryCode = await finalResponse.text();
                log(`📊 Country code: ${countryCode}`);

                const countryNames = {
                    'US': 'United States', 'IL': 'Israel', 'DE': 'Germany', 'FR': 'France',
                    'GB': 'United Kingdom', 'CA': 'Canada', 'AU': 'Australia', 'IT': 'Italy',
                    'ES': 'Spain', 'NL': 'Netherlands', 'CH': 'Switzerland', 'AT': 'Austria'
                };
                const countryName = countryNames[countryCode.trim()] || countryCode.trim();
                if (countryName) {
                    fromField.value = countryName;
                    fromField.placeholder = countryName;
                    log(`✅ Final fallback country detected: ${countryName}`, 'success');
                    updateStatus(`✅ Final fallback country detected: ${countryName}`, 'success');
                    return;
                }
            }

            throw new Error('All fallback services failed');

        } catch (backupError) {
            log(`❌ All location detection services failed: ${backupError.message}`, 'error');
            fromField.placeholder = 'Enter your departure city...';
            fromField.value = '';
            updateStatus('❌ Location detection failed - enter manually', 'error');

            // Show a subtle notification to user
            setTimeout(() => {
                log('💡 Location detection not available, please enter manually');
            }, 1000);
        }
    }
}

// Auto-run test on page load
window.onload = () => {
    log('🚀 Fixed location detection test page loaded');
    log('👆 Click "Detect Location" button to test');
};
</script>

</body>
</html>
